name = "gardens-web-gateway"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]
assets = { directory = "./public" }

# Environment variables (set via `wrangler secret put` or wrangler.toml):
# - APP_STORE_URL: iOS App Store URL for download button
# - PLAY_STORE_URL: Google Play Store URL for download button
# - APP_SCHEME: Custom scheme for opening app (default: "gardens")

[vars]
APP_SCHEME = "gardens"
DEFAULT_RELAY_URL = "https://gardens-relay.stereos.workers.dev"

[env.production.vars]
APP_SCHEME = "gardens"
DEFAULT_RELAY_URL = "https://gardens-relay.stereos.workers.dev"

[[kv_namespaces]]
binding = "PUBLIC_BLOBS"
id = "60ab4a818c3e4f75a3902fe7a50eabf7"

[observability]
[observability.logs]
enabled = false
invocation_logs = true